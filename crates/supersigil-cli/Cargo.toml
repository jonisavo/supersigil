[package]
name = "supersigil-cli"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "supersigil"
path = "src/main.rs"

[lib]
name = "supersigil_cli"
path = "src/lib.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
serde = { workspace = true }
serde_json = "1"
yaml_serde = { workspace = true }
glob = "0.3"
thiserror = { workspace = true }
supersigil-core = { workspace = true }
supersigil-parser = { path = "../supersigil-parser" }
supersigil-import = { path = "../supersigil-import" }

[dev-dependencies]
assert_cmd = "2"
predicates = "3"
tempfile = "3"
walkdir = "2"

[lints]
workspace = true
