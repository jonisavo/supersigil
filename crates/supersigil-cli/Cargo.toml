[package]
name = "supersigil-cli"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "supersigil"
path = "src/main.rs"

[lib]
name = "supersigil_cli"
path = "src/lib.rs"

[dependencies]
anstyle = "1.0.13"
clap = { version = "4.5.60", features = ["derive"] }
serde.workspace = true
serde_json.workspace = true
yaml_serde.workspace = true
glob.workspace = true
toml.workspace = true
thiserror.workspace = true
supersigil-core.workspace = true
supersigil-evidence.workspace = true
supersigil-parser = { path = "../supersigil-parser" }
supersigil-import = { path = "../supersigil-import" }
supersigil-rust.workspace = true
supersigil-verify = { path = "../supersigil-verify" }
include_dir.workspace = true

[dev-dependencies]
assert_cmd = "2.1.2"
predicates = "3.1.4"
supersigil-verify = { path = "../supersigil-verify", features = ["test-helpers"] }
tempfile.workspace = true
walkdir = "2.5.0"

[lints]
workspace = true
