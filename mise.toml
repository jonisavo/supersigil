[tasks.setup]
description = "Set up the development environment."
run = [
    "pnpm install",
    "lefthook install",
    "cargo build --workspace",
]

[tasks.format]
description = "Format the workspace."
run = "cargo fmt --all"

[tasks.lint]
description = "Lint the workspace."
run = [
    "cargo clippy --workspace --all-targets --all-features",
    "cargo run -p supersigil-cli lint"
]

[tasks.fix]
description = "Apply fixes in the workspace."
run = [
    "cargo fmt --all",
    "cargo clippy --fix --workspace --all-targets --allow-dirty --allow-staged",
]

[tasks.bundle-explore]
description = "Bundle the standalone graph explorer for use with the CLI."
run = "pnpm run bundle:standalone"
dir = "website"

[tasks.build]
description = "Build the workspace."
run = "cargo build --workspace --release"
depends = ["bundle-explore"]

[tasks.test]
description = "Run workspace tests."
run = [
    "cargo nextest run",
    "cargo run -p supersigil-cli verify"
]

[tasks.qa]
description = "Run all tooling to ensure the repository is squeaky clean."
run = ["mise format", "mise lint", "mise build", "mise test"]

[tasks.install-cli]
description = "Install the CLI locally"
run = "cargo install --path ."
dir = "crates/supersigil-cli"

[tasks."install-cli:safe"]
description = "Install the CLI locally after QA is OK"
run = ["mise install-cli"]
depends = "qa"

[tasks.install-lsp]
description = "Install the LSP server locally"
run = "cargo install --path ."
dir = "crates/supersigil-lsp"

[tasks."install-lsp:safe"]
description = "Install the LSP server locally after QA is OK"
run = ["mise install-lsp"]
depends = "qa"

[tasks.install-all]
description = "Install all binaries locally"
run = ["mise bundle-explore", "mise install-cli", "mise install-lsp"]

[tasks.release]
description = "Prepare a release: bump versions, commit, and tag."
run = """
#!/usr/bin/env bash
set -euo pipefail

VERSION="${1:?Usage: mise release <version>}"

# Strip leading 'v' if present
VERSION="${VERSION#v}"

echo "Preparing release v${VERSION}..."

# Update all crate versions
for crate in crates/*/Cargo.toml; do
  sed -i'' -e "s/^version = \".*\"/version = \"${VERSION}\"/" "$crate"
done

# Update workspace dependency version specifiers
sed -i'' -e 's/version = "=[0-9][0-9]*[.][0-9][0-9]*[.][0-9][0-9]*"/version = "='"${VERSION}"'"/' Cargo.toml

# Update VS Code extension version
sed -i'' -e "s/\"version\": \".*\"/\"version\": \"${VERSION}\"/" editors/vscode/package.json

# Update IntelliJ plugin version
sed -i'' -e "s/^pluginVersion = .*/pluginVersion = ${VERSION}/" editors/intellij/gradle.properties

# Update Cargo.lock
cargo generate-lockfile

echo "Updated versions to ${VERSION}. Review the changes:"
git diff --stat

echo ""
echo "To finish the release:"
echo "  git add -A && git commit -m 'chore(release): prepare v${VERSION}'"
echo "  git tag v${VERSION}"
echo "  git push && git push --tags"
"""
