[tasks.setup]
description = "Set up the development environment."
run = [
  "pnpm install",
  "mise bundle-cli",
  "cargo build --workspace",
  "lefthook install",
]

[tasks.format]
description = "Format the workspace."
run = "cargo fmt --all"

[tasks.verify]
description = "Verify the Supersigil specifications."
run = "cargo run -p supersigil verify"

[tasks.lint]
description = "Lint the workspace."
run = [
  "cargo clippy --workspace --all-targets --all-features",
  "mise lint:js",
  "mise lint:types"
]

[tasks."lint:js"]
description = "Lint JS/TS packages."
run = "pnpm lint:eslint"

[tasks."lint:types"]
description = "Type-check JS/TS packages."
run = "pnpm -r check-types"

[tasks.fix]
description = "Apply fixes in the workspace."
run = [
  "cargo fmt --all",
  "cargo clippy --fix --workspace --all-targets --allow-dirty --allow-staged",
  "mise fix:js",
]

[tasks."fix:js"]
description = "Apply ESLint fixes to JS/TS packages."
run = "eslint --fix packages/"

[tasks.bundle-cli]
description = "Bundle all assets required to compile the CLI crate."
run = "pnpm run bundle:cli-assets"

[tasks.build]
description = "Build the workspace."
run = [
  "cargo build --workspace --release",
  "mise build:vscode",
  "mise build:intellij",
]
depends = ["bundle-cli", "build:js"]

[tasks."build:js"]
description = "Build JS/TS packages."
run = ["mise build:eslint-plugin", "mise build:vitest"]

[tasks."build:eslint-plugin"]
description = "Build eslint-plugin package."
run = "pnpm build"
dir = "packages/eslint-plugin"

[tasks."build:vitest"]
description = "Build vitest helper package."
run = "pnpm build"
dir = "packages/vitest"

[tasks."build:vscode"]
description = "Build the VS Code extension."
run = "pnpm package"
dir = "editors/vscode"

[tasks."build:intellij"]
description = "Build the IntelliJ plugin."
run = "./gradlew buildPlugin"
dir = "editors/intellij"

[tasks.test]
description = "Run workspace tests."
run = ["cargo nextest run", "mise test:js"]

[tasks."test:js"]
description = "Run JS/TS package tests."
run = [
  "mise test:eslint-plugin",
  "mise test:vitest",
  "mise test:preview",
  "mise test:release-targets",
]

[tasks."test:eslint-plugin"]
description = "Run eslint-plugin tests."
run = "pnpm test"
dir = "packages/eslint-plugin"

[tasks."test:vitest"]
description = "Run vitest helper tests."
run = "pnpm test"
dir = "packages/vitest"

[tasks."test:preview"]
description = "Run preview package tests."
run = "pnpm test"
dir = "packages/preview"

[tasks."test:release-targets"]
description = "Run release-target helper tests."
run = "pnpm test"
dir = "scripts/release-targets"

[tasks.qa]
description = "Run all tooling to ensure the repository is squeaky clean."
run = ["mise format", "mise lint", "mise build", "mise test", "mise verify"]

[tasks.install-cli]
description = "Install the CLI locally"
run = "cargo install --path ."
dir = "crates/supersigil-cli"
depends = ["bundle-cli"]

[tasks."install-cli:safe"]
description = "Install the CLI locally after QA is OK"
run = ["mise install-cli"]
depends = "qa"

[tasks.install-lsp]
description = "Install the LSP server locally"
run = "cargo install --path ."
dir = "crates/supersigil-lsp"

[tasks."install-lsp:safe"]
description = "Install the LSP server locally after QA is OK"
run = ["mise install-lsp"]
depends = "qa"

[tasks.install-all]
description = "Install all binaries locally"
run = ["mise install-cli", "mise install-lsp"]

[tasks."release:detect"]
description = "Detect what will be released based on git history and print a summary."
run = "node scripts/release-targets/index.mjs detect"

[tasks.release]
description = "Prepare a release: bump versions, update changelog, commit, and tag."
run = """
#!/usr/bin/env bash
set -euo pipefail

VERSION="${1:?Usage: mise release <version>}"

# Strip leading 'v' if present
VERSION="${VERSION#v}"

# Require git-cliff for changelog generation
if ! command -v git-cliff &>/dev/null; then
  echo "error: git-cliff is required but not found"
  echo "Install with: cargo install git-cliff"
  exit 1
fi

echo "Preparing release v${VERSION}..."

# Prepare selective release-target metadata
PREPARE_JSON="$(node scripts/release-targets/index.mjs prepare \
  --version "${VERSION}" \
  --git-cliff-bin "$(command -v git-cliff)" \
  --json)"

target_is_impacted() {
  local target_id="${1}"
  node -e '
const data = JSON.parse(process.argv[1]);
const targetId = process.argv[2];
process.exit(data.targets[targetId]?.impacted ? 0 : 1);
' "${PREPARE_JSON}" "${target_id}"
}

any_pnpm_target_impacted() {
  node -e '
const data = JSON.parse(process.argv[1]);
const { readFileSync } = require("node:fs");
const registry = JSON.parse(readFileSync("release-targets.json", "utf8"));
const impacted = registry.targets
  .filter((target) => target.versionKind !== "cargo-workspace")
  .some((target) => data.targets[target.id]?.impacted);
process.exit(impacted ? 0 : 1);
' "${PREPARE_JSON}"
}

stage_if_changed() {
  local path="${1}"
  if git diff --quiet -- "${path}"; then
    return 0
  fi
  git add "${path}"
}

# Update lockfiles
if target_is_impacted "crates"; then
  cargo generate-lockfile
fi

if any_pnpm_target_impacted; then
  pnpm install --lockfile-only
fi

# Generate changelog
git-cliff --tag "v${VERSION}" --output CHANGELOG.md

# Stage and commit
if target_is_impacted "crates"; then
  stage_if_changed Cargo.toml
  stage_if_changed Cargo.lock
  for crate in crates/*/Cargo.toml; do
    stage_if_changed "${crate}"
  done
fi

if target_is_impacted "npm-eslint-plugin"; then
  stage_if_changed packages/eslint-plugin/package.json
fi

if target_is_impacted "npm-vitest"; then
  stage_if_changed packages/vitest/package.json
fi

if target_is_impacted "vscode"; then
  stage_if_changed editors/vscode/package.json
  stage_if_changed editors/vscode/CHANGELOG.md
fi

if target_is_impacted "intellij"; then
  stage_if_changed editors/intellij/gradle.properties
  stage_if_changed editors/intellij/CHANGELOG.md
fi

if any_pnpm_target_impacted; then
  stage_if_changed pnpm-lock.yaml
fi

stage_if_changed CHANGELOG.md

git commit -m "chore(release): prepare v${VERSION}"
git tag "v${VERSION}"

echo ""
echo "Release v${VERSION} prepared. Review with:"
echo "  git log --oneline -1"
echo "  git diff HEAD~1"
echo ""
echo "To publish:"
echo "  git push && git push --tags"
echo ""
echo "To undo:"
echo "  git tag -d v${VERSION} && git reset --soft HEAD~1"
"""
