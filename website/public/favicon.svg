<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <circle cx="16" cy="16" r="15.5" fill="#0b0b12"/>

  <!-- Ordinal arms (thinner, shorter — back layer) -->
  <line x1="16" y1="16" x2="22.7" y2="9.3" stroke="#c9a55c" stroke-width="0.8"/>
  <line x1="16" y1="16" x2="22.7" y2="22.7" stroke="#c9a55c" stroke-width="0.8"/>
  <line x1="16" y1="16" x2="9.3" y2="22.7" stroke="#c9a55c" stroke-width="0.8"/>
  <line x1="16" y1="16" x2="9.3" y2="9.3" stroke="#c9a55c" stroke-width="0.8"/>

  <!-- Cardinal arms (thicker, longer) -->
  <line x1="16" y1="16" x2="16" y2="3" stroke="#c9a55c" stroke-width="1.2"/>
  <line x1="16" y1="16" x2="29" y2="16" stroke="#c9a55c" stroke-width="1.2"/>
  <line x1="16" y1="16" x2="16" y2="29" stroke="#c9a55c" stroke-width="1.2"/>
  <line x1="16" y1="16" x2="3" y2="16" stroke="#c9a55c" stroke-width="1.2"/>

  <!-- Inner ring -->
  <circle cx="16" cy="16" r="5.5" fill="none" stroke="#c9a55c" stroke-width="0.7"/>

  <!-- Center hub -->
  <circle cx="16" cy="16" r="3" fill="#c9a55c"/>

  <!-- Cardinal terminal nodes (larger) -->
  <circle cx="16" cy="3" r="1.8" fill="#c9a55c"/>
  <circle cx="29" cy="16" r="1.8" fill="#c9a55c"/>
  <circle cx="16" cy="29" r="1.8" fill="#c9a55c"/>
  <circle cx="3" cy="16" r="1.8" fill="#c9a55c"/>

  <!-- Ordinal terminal nodes (smaller) -->
  <circle cx="22.7" cy="9.3" r="1.3" fill="#c9a55c"/>
  <circle cx="22.7" cy="22.7" r="1.3" fill="#c9a55c"/>
  <circle cx="9.3" cy="22.7" r="1.3" fill="#c9a55c"/>
  <circle cx="9.3" cy="9.3" r="1.3" fill="#c9a55c"/>
</svg>
