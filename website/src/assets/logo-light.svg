<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!-- Ordinal arms -->
  <line x1="12" y1="12" x2="17" y2="7" stroke="#8a6c2f" stroke-width="0.7"/>
  <line x1="12" y1="12" x2="17" y2="17" stroke="#8a6c2f" stroke-width="0.7"/>
  <line x1="12" y1="12" x2="7" y2="17" stroke="#8a6c2f" stroke-width="0.7"/>
  <line x1="12" y1="12" x2="7" y2="7" stroke="#8a6c2f" stroke-width="0.7"/>

  <!-- Cardinal arms -->
  <line x1="12" y1="12" x2="12" y2="2.5" stroke="#8a6c2f" stroke-width="1"/>
  <line x1="12" y1="12" x2="21.5" y2="12" stroke="#8a6c2f" stroke-width="1"/>
  <line x1="12" y1="12" x2="12" y2="21.5" stroke="#8a6c2f" stroke-width="1"/>
  <line x1="12" y1="12" x2="2.5" y2="12" stroke="#8a6c2f" stroke-width="1"/>

  <!-- Inner ring -->
  <circle cx="12" cy="12" r="4" fill="none" stroke="#8a6c2f" stroke-width="0.6"/>

  <!-- Center hub -->
  <circle cx="12" cy="12" r="2.2" fill="#8a6c2f"/>

  <!-- Cardinal terminal nodes -->
  <circle cx="12" cy="2.5" r="1.4" fill="#8a6c2f"/>
  <circle cx="21.5" cy="12" r="1.4" fill="#8a6c2f"/>
  <circle cx="12" cy="21.5" r="1.4" fill="#8a6c2f"/>
  <circle cx="2.5" cy="12" r="1.4" fill="#8a6c2f"/>

  <!-- Ordinal terminal nodes -->
  <circle cx="17" cy="7" r="1" fill="#8a6c2f"/>
  <circle cx="17" cy="17" r="1" fill="#8a6c2f"/>
  <circle cx="7" cy="17" r="1" fill="#8a6c2f"/>
  <circle cx="7" cy="7" r="1" fill="#8a6c2f"/>
</svg>
