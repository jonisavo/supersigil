name: Publish Homebrew

on:
  workflow_call:
    secrets:
      HOMEBREW_TOKEN:
        required: true
  workflow_dispatch:

jobs:
  homebrew:
    name: Update Homebrew formula
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release download "v${VERSION}" --pattern "SHA256SUMS" --dir /tmp

      - name: Generate formula
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          cp dist/homebrew/supersigil.rb.tmpl /tmp/supersigil.rb

          sed -i "s/@@VERSION@@/${VERSION}/g" /tmp/supersigil.rb
          sed -i "s/@@SHA256_AARCH64_APPLE@@/$(grep aarch64-apple-darwin /tmp/SHA256SUMS | cut -d' ' -f1)/" /tmp/supersigil.rb
          sed -i "s/@@SHA256_X86_64_APPLE@@/$(grep x86_64-apple-darwin /tmp/SHA256SUMS | cut -d' ' -f1)/" /tmp/supersigil.rb
          sed -i "s/@@SHA256_AARCH64_LINUX@@/$(grep aarch64-unknown-linux-musl /tmp/SHA256SUMS | cut -d' ' -f1)/" /tmp/supersigil.rb
          sed -i "s/@@SHA256_X86_64_LINUX@@/$(grep x86_64-unknown-linux-musl /tmp/SHA256SUMS | cut -d' ' -f1)/" /tmp/supersigil.rb

      - name: Validate formula
        run: |
          if grep -q '@@' /tmp/supersigil.rb; then
            echo "ERROR: Unresolved placeholders in formula"
            cat /tmp/supersigil.rb
            exit 1
          fi

      - name: Push to tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TOKEN }}
        run: |
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/jonisavo/homebrew-supersigil.git" /tmp/tap
          mkdir -p /tmp/tap/Formula
          cp /tmp/supersigil.rb /tmp/tap/Formula/supersigil.rb
          cd /tmp/tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/supersigil.rb
          git commit -m "supersigil ${GITHUB_REF_NAME}"
          git push
