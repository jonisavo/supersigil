name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master, "Add 1.94.1 patch release"
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"
          cache: pnpm

      - name: Bundle explore assets
        run: pnpm install --frozen-lockfile && pnpm run bundle:explore-assets

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features

      - name: Conventional commit check
        uses: cocogitto/cocogitto-action@9a9fe03b31c47444290c0d7f9b1ee1b44ee13f20 # v4.1.0
        with:
          command: check

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master, "Add 1.94.1 patch release"
        with:
          toolchain: stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install nextest
        uses: taiki-e/install-action@1ed3272338f573e042a2e6bca3893aa19f43b47a # v2.71.3
        with:
          tool: cargo-nextest@0.9.132

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"
          cache: pnpm

      - name: Bundle explore assets
        run: pnpm install --frozen-lockfile && pnpm run bundle:explore-assets

      - name: Test
        run: cargo nextest run

      - name: Verify
        run: cargo run -p supersigil verify

  cross-check:
    name: Cross-check (${{ matrix.target }})
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            runner: macos-26-intel
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            deps: sudo apt-get update && sudo apt-get install -y musl-tools
            extra-args: --features supersigil-verify/vendored-openssl
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
            deps: sudo apt-get update && sudo apt-get install -y musl-tools
            extra-args: --features supersigil-verify/vendored-openssl
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master, "Add 1.94.1 patch release"
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install dependencies
        if: matrix.deps
        run: ${{ matrix.deps }}

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"
          cache: pnpm

      - name: Bundle explore assets
        run: pnpm install --frozen-lockfile && pnpm run bundle:explore-assets

      - name: Check
        run: cargo check --workspace --target ${{ matrix.target }} ${{ matrix.extra-args }}
