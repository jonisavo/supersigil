name: Publish Crates

on:
  workflow_call:
    secrets:
      CRATES_IO_TOKEN:
        required: true
  workflow_dispatch:

jobs:
  crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"
          cache: pnpm

      - name: Bundle CLI assets
        run: pnpm install --frozen-lockfile && pnpm run bundle:cli-assets

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master, "Add 1.94.1 patch release"
        with:
          toolchain: stable

      - name: Install cargo-workspaces
        uses: taiki-e/install-action@1ed3272338f573e042a2e6bca3893aa19f43b47a # v2.71.3
        with:
          tool: cargo-workspaces@0.4.2

      - name: Publish
        run: cargo ws publish --from-git --publish-interval 15 --yes
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
