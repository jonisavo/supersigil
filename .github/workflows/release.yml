name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  ci-gate:
    name: Wait for CI
    runs-on: ubuntu-latest
    steps:
      - name: Wait for CI to succeed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA="${{ github.sha }}"
          echo "Waiting for CI to pass on ${SHA}..."
          for i in $(seq 1 60); do
            STATUS=$(gh api repos/${{ github.repository }}/commits/${SHA}/check-runs \
              --jq '[.check_runs[] | select(.name == "Check" or .name == "Test")] | if length == 0 then "pending" elif all(.conclusion == "success") then "success" elif any(.conclusion == "failure") then "failure" else "pending" end')
            echo "  Attempt ${i}: ${STATUS}"
            if [ "$STATUS" = "success" ]; then
              echo "CI passed!"
              exit 0
            elif [ "$STATUS" = "failure" ]; then
              echo "CI failed — aborting release."
              exit 1
            fi
            sleep 30
          done
          echo "Timed out waiting for CI."
          exit 1

  prepare:
    name: Bundle CLI assets
    needs: ci-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"
          cache: pnpm

      - name: Bundle CLI assets
        run: pnpm install --frozen-lockfile && pnpm run bundle:cli-assets

      - name: Upload CLI assets
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: cli-assets
          path: |
            crates/supersigil-cli/src/commands/explore_assets/
            crates/supersigil-cli/skills/

  build:
    name: Build (${{ matrix.target }})
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            runner: macos-26-intel
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            deps: sudo apt-get update && sudo apt-get install -y musl-tools
            extra-args: --features supersigil-verify/vendored-openssl
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
            deps: sudo apt-get update && sudo apt-get install -y musl-tools
            extra-args: --features supersigil-verify/vendored-openssl
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master, "Add 1.94.1 patch release"
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Download CLI assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cli-assets
          path: crates/supersigil-cli

      - name: Install dependencies
        if: matrix.deps
        run: ${{ matrix.deps }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p supersigil -p supersigil-lsp ${{ matrix.extra-args }}

      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          RELEASE_DIR="target/${{ matrix.target }}/release"
          for bin in supersigil supersigil-lsp; do
            ARCHIVE="${bin}-${VERSION}-${{ matrix.target }}.tar.gz"
            tar -czf "${ARCHIVE}" -C "${RELEASE_DIR}" "${bin}"
            if command -v sha256sum &>/dev/null; then
              sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"
            else
              shasum -a 256 "${ARCHIVE}" > "${ARCHIVE}.sha256"
            fi
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: supersigil-${{ matrix.target }}
          path: |
            supersigil-*.tar.gz
            supersigil-*.tar.gz.sha256

  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install git-cliff
        uses: taiki-e/install-action@1ed3272338f573e042a2e6bca3893aa19f43b47a # v2.71.3
        with:
          tool: git-cliff@2.12.0

      - name: Generate changelog
        run: git-cliff --latest --strip header > RELEASE_NOTES.md

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true

      - name: Create SHA256SUMS
        run: cat artifacts/*.sha256 > artifacts/SHA256SUMS

      - name: Create release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          body_path: RELEASE_NOTES.md
          files: |
            artifacts/supersigil-*.tar.gz
            artifacts/SHA256SUMS

  publish-crates:
    name: Publish crates.io
    needs: release
    uses: ./.github/workflows/publish-crates.yml
    secrets:
      CRATES_IO_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

  publish-npm:
    name: Publish npm
    needs: release
    uses: ./.github/workflows/publish-npm.yml
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-homebrew:
    name: Publish Homebrew
    needs: release
    uses: ./.github/workflows/publish-homebrew.yml
    secrets:
      HOMEBREW_TOKEN: ${{ secrets.HOMEBREW_TOKEN }}

  publish-aur:
    name: Publish AUR
    needs: release
    uses: ./.github/workflows/publish-aur.yml
    secrets:
      AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}

  publish-vscode:
    name: Publish VS Code
    needs: release
    uses: ./.github/workflows/publish-vscode.yml
    secrets:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      OVSX_TOKEN: ${{ secrets.OVSX_TOKEN }}

  # TODO: re-enable once plugin is listed on JetBrains Marketplace
