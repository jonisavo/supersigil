name: Verify Specs

on:
  pull_request:

permissions:
  pull-requests: write

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master, "Add 1.94.1 patch release"
        with:
          toolchain: stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Verify (JSON)
        id: verify
        run: |
          set +e
          cargo run -p supersigil-cli -- verify \
            --since origin/main --merge-base --committed-only \
            --format json --detail full --color never \
            > verify.json
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Verify (Markdown)
        run: |
          cargo run -p supersigil-cli -- verify \
            --since origin/main --merge-base --committed-only \
            --format markdown --color never \
            > verify.md

      - name: Post PR comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BODY=$(cat verify.md)
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body "$BODY" --edit-last \
          || gh pr comment "${{ github.event.pull_request.number }}" \
            --body "$BODY"

      - name: Fail if verify failed
        if: steps.verify.outputs.exit_code != '0'
        run: |
          echo "::error::Supersigil verification failed"
          cat verify.json
          exit 1
