<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40">
  <circle cx="20" cy="20" r="19.5" fill="#0b0b12"/>

  <!-- Ordinal arms (thinner, shorter) -->
  <line x1="20" y1="20" x2="28.4" y2="11.6" stroke="#c9a55c" stroke-width="1"/>
  <line x1="20" y1="20" x2="28.4" y2="28.4" stroke="#c9a55c" stroke-width="1"/>
  <line x1="20" y1="20" x2="11.6" y2="28.4" stroke="#c9a55c" stroke-width="1"/>
  <line x1="20" y1="20" x2="11.6" y2="11.6" stroke="#c9a55c" stroke-width="1"/>

  <!-- Cardinal arms (thicker, longer) -->
  <line x1="20" y1="20" x2="20" y2="3.5" stroke="#c9a55c" stroke-width="1.5"/>
  <line x1="20" y1="20" x2="36.5" y2="20" stroke="#c9a55c" stroke-width="1.5"/>
  <line x1="20" y1="20" x2="20" y2="36.5" stroke="#c9a55c" stroke-width="1.5"/>
  <line x1="20" y1="20" x2="3.5" y2="20" stroke="#c9a55c" stroke-width="1.5"/>

  <!-- Inner ring -->
  <circle cx="20" cy="20" r="7" fill="none" stroke="#c9a55c" stroke-width="0.9"/>

  <!-- Center hub -->
  <circle cx="20" cy="20" r="3.8" fill="#c9a55c"/>

  <!-- Cardinal terminal nodes -->
  <circle cx="20" cy="3.5" r="2.2" fill="#c9a55c"/>
  <circle cx="36.5" cy="20" r="2.2" fill="#c9a55c"/>
  <circle cx="20" cy="36.5" r="2.2" fill="#c9a55c"/>
  <circle cx="3.5" cy="20" r="2.2" fill="#c9a55c"/>

  <!-- Ordinal terminal nodes -->
  <circle cx="28.4" cy="11.6" r="1.6" fill="#c9a55c"/>
  <circle cx="28.4" cy="28.4" r="1.6" fill="#c9a55c"/>
  <circle cx="11.6" cy="28.4" r="1.6" fill="#c9a55c"/>
  <circle cx="11.6" cy="11.6" r="1.6" fill="#c9a55c"/>
</svg>
