# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[graph]
targets = []
all-features = true

# --- Vulnerability advisories (RustSec) ---
[advisories]
unmaintained = "workspace"
yanked = "deny"
# ignore = ["RUSTSEC-2024-XXXX"]

# --- License policy ---
[licenses]
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSL-1.0",
    "MIT",
    "Unicode-3.0",
    "Unlicense",
]
confidence-threshold = 0.8

# --- Crate bans ---
[bans]
multiple-versions = "warn"
wildcards = "allow"

# --- Source provenance ---
[sources]
unknown-registry = "deny"
unknown-git = "deny"
