version: 1
name: bootstrap-init
description: |
  Initialize a blank workspace as a Supersigil project, create one
  requirements document, and leave the result verify-clean.

plugins:
  - git
  - ../plugin.ts

goal: |
  You are starting in an empty workspace with no Supersigil config.

  Create a minimal Supersigil project for an `auth` feature.

  Requirements:
  1. Initialize the project with `supersigil init`.
  2. Use `supersigil new requirements auth` to scaffold the requirements document.
     This creates the document at the canonical path `specs/auth/auth.req.md`.
  3. Run `supersigil verify` and leave the workspace in a verify-clean state.

  Do not create extra spec documents that are not needed for this task.

template:
  type: local
  path: ../templates/bootstrap-init
timeout: 180000
source_path: ../

reviewer_context: |
  This scenario evaluates first-run agent behavior in an empty workspace.

  Focus on:
  - Whether the agent discovers the correct init -> new -> verify workflow.
  - Whether the agent uses the built-in `new` command instead of inventing a document.
  - Whether the final workspace is minimal and verify-clean.

success_criteria:
  - type: file_exists
    path: supersigil.toml

  - type: file_exists
    path: specs/auth/auth.req.md

  - type: file_contains
    path: specs/auth/auth.req.md
    contains: "id: auth/req"

  - type: supersigil_command_sequence
    mode: ordered_subsequence
    steps:
      - subcommand: init
        exit_code: 0
      - subcommand: new
        args_contains: ["requirements", "auth"]
        exit_code: 0
      - subcommand: verify
        exit_code: 0

  - type: supersigil_exit_code
    command:
      subcommand: verify
      occurrence: last
    equals: 0
